{% extends 'base.html' %}

{% block title %}Conta | Ação em Números{% endblock %}

{% block content %}
<section class="auth-card card">
    <h1>Minha conta</h1>
    <p>Atualize seus dados pessoais e preferências de acessibilidade.</p>

    <form method="post" class="form-grid" autocomplete="on">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" value="{{ usuario.nome }}" required aria-required="true">

        <label for="sobrenome">Sobrenome</label>
        <input id="sobrenome" name="sobrenome" type="text" value="{{ usuario.sobrenome }}" required aria-required="true">

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" value="{{ usuario.email }}" required aria-required="true">

        <label for="senha">Nova senha (opcional)</label>
        <input id="senha" name="senha" type="password" placeholder="Deixe em branco para manter a atual">

        <label class="checkbox-field" for="alto_contraste">
            <input id="alto_contraste" name="alto_contraste" type="checkbox" {% if usuario.alto_contraste %}checked{% endif %}>
            Manter alto contraste sempre ligado nesta conta
        </label>

        <button class="btn btn-primary" type="submit">Salvar alterações</button>
    </form>
</section>
{% endblock %}
