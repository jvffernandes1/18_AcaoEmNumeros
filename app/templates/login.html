{% extends 'base.html' %}

{% block title %}Login | Ação em Números{% endblock %}

{% block content %}
<section class="auth-card card">
    <h1>Entrar na plataforma</h1>
    <p>Use seu e-mail e senha para acessar o dashboard.</p>

    <form method="post" class="form-grid" autocomplete="on">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required aria-required="true">

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required aria-required="true">

        <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

    <p class="auth-footnote">Ainda não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a>.</p>
</section>
{% endblock %}
